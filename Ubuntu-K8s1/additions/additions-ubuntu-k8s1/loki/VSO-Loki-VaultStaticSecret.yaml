apiVersion: secrets.hashicorp.com/v1beta1

# kubectl apply  -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/loki/VSO-Loki-VaultStaticSecret.yaml
# kubectl delete -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/loki/VSO-Loki-VaultStaticSecret.yaml

kind: VaultStaticSecret
metadata:
  name: loki-vault-static-secret
  namespace: loki
spec:
  vaultAuthRef: loki-static-auth    # Ссылается на VaultAuth
  mount: loki                       # Папка с секретами в Vault (Vault -> "Secrets Engines")
  type: kv-v2
  path: loki-secret                 # Путь к секрету в папке из пункта "mount"
  refreshAfter: 10s                 # Интервал обновления секрета
  destination:
    create: true                    # Создать секрет, если его нет
    name: minio-for-loki-secret     # Имя секрета
  rolloutRestartTargets:
  - kind: StatefulSet               # Какой ресурс надо перезапустить
    name: loki-compactor            # Имя ресурса
  - kind: StatefulSet
    name: loki-ingester-zone-a
  - kind: StatefulSet
    name: loki-ingester-zone-b
  - kind: StatefulSet
    name: loki-ingester-zone-c
