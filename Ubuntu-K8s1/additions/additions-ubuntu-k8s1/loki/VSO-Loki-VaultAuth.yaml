apiVersion: secrets.hashicorp.com/v1beta1

# kubectl apply  -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/loki/VSO-Loki-VaultAuth.yaml
# kubectl delete -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/loki/VSO-Loki-VaultAuth.yaml

kind: VaultAuth
metadata:
  name: loki-static-auth               # Будет использоваться в VaultStaticSecret
  namespace: loki
spec:
  # vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: loki-secret-role            # Ссылается на "vault_role_name" из Terraform
    serviceAccount: default
    audiences:
      - vault