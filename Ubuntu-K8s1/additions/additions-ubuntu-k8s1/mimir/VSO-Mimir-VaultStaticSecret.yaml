apiVersion: secrets.hashicorp.com/v1beta1

# kubectl apply  -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/mimir/VSO-Mimir-VaultStaticSecret.yaml
# kubectl delete -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/mimir/VSO-Mimir-VaultStaticSecret.yaml

kind: VaultStaticSecret
metadata:
  name: mimir-vault-static-secret
  namespace: mimir
spec:
  vaultAuthRef: mimir-static-auth   # Ссылается на VaultAuth
  mount: mimir                      # Папка с секретами в Vault (Vault -> "Secrets Engines")
  type: kv-v2
  path: mimir-secret                # Путь к секрету в папке из пункта "mount"
  refreshAfter: 10s                 # Интервал обновления секрета
  destination:
    create: true                    # Создать секрет, если его нет
    name: minio-for-mimir-secret    # Имя секрета
  # rolloutRestartTargets:
  # - kind: StatefulSet               # Какой ресурс надо перезапустить
  #   name: minio                     # Имя ресурса
