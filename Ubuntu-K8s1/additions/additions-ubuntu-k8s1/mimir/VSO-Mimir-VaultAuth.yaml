apiVersion: secrets.hashicorp.com/v1beta1

# kubectl apply  -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/mimir/VSO-Mimir-VaultAuth.yaml
# kubectl delete -f Ubuntu-K8s1/additions/additions-ubuntu-k8s1/mimir/VSO-Mimir-VaultAuth.yaml

kind: VaultAuth
metadata:
  name: mimir-static-auth              # Бужет использоваться в VaultStaticSecret
  namespace: mimir
spec:
  # vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: mimir-secret-role            # Ссылается на "vault_role_name" из Terraform
    serviceAccount: default
    audiences:
      - vault