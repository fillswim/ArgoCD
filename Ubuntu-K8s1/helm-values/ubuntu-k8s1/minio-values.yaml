mode: distributed

replicas: 3
existingSecret: "minio-my-k8s-secret"

persistence:
  enabled: true
  storageClass: "longhorn"
  volumeName: ""
  accessMode: ReadWriteOnce
  size: 100Gi

ingress:
  enabled: true
  ingressClassName: "nginx"
  labels: {}
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: ca-cluster-issuer
  path: /
  hosts:
    - api.minio.lab.local
  tls:
   - secretName: minio-api-tls
     hosts:
       - api.minio.lab.local

consoleIngress:
  enabled: true
  ingressClassName: "nginx"
  labels: {}
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: ca-cluster-issuer
  path: /
  hosts:
    - console.minio.lab.local
  tls:
   - secretName: minio-console-tls
     hosts:
       - console.minio.lab.local

