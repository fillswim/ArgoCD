replicas: 1

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPU: "60"
  targetMemory: ""
  behavior: {}

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: ca-cluster-issuer
  hosts:
    - grafana.lab.local

  tls:
   - secretName: grafana-tls
     hosts:
       - grafana.lab.local

persistence:
  type: pvc
  enabled: true

  accessModes:
    - ReadWriteMany
  size: 10Gi
  finalizers:
    - kubernetes.io/pvc-protection

admin:
  existingSecret: "grafana-my-secret"
  userKey: admin-user
  passwordKey: admin-password

sidecar:
  dashboards:
    enabled: true

command:
- "sh"
- "-c"
- |
  grafana cli admin reset-admin-password $GF_SECURITY_ADMIN_PASSWORD && \
  /run.sh
