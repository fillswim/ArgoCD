apiVersion: argoproj.io/v1alpha1
kind: Application

# kubectl apply  -f Ubuntu-k8s1/applications-non-sync/ubuntu-k8s1/nicolaka-ubuntu-k8s1.yaml
# kubectl delete -f Ubuntu-k8s1/applications-non-sync/ubuntu-k8s1/nicolaka-ubuntu-k8s1.yaml

metadata:
  name: nicolaka-ubuntu-k8s1                                                    # Название создаваемого Argo CD application
  namespace: argo-cd                                                          # namespace, в котором будет создаваться Argo CD application
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background

spec:
  project: default

  destination:
    # name: in-cluster                                                          # Деплой в этот же кластер
    name: kubernetes-admin-ubuntu-k8s1@ubuntu-k8s1                            # Деплой в этот же кластер
    namespace: nicolaka                                                       # В какой namespace будет производиться деплой

  sources:

    - repoURL: 'https://github.com/fillswim/ArgoCD.git'                       # Репозиторий
      path: "Ubuntu-K8s1/additions/additions-ubuntu-k8s1/nicolaka"            # Относительный путь отслеживаемой папки
      targetRevision: HEAD


  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      # - ServerSideApply=true